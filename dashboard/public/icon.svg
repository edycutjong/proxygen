<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="var(--primary, #06B6D4)"/>
      <stop offset="100%" stop-color="var(--accent, #22C55E)"/>
    </linearGradient>
    <filter id="innerGlow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <radialGradient id="coreGlow" cx="50%" cy="45%" r="35%">
      <stop offset="0%" stop-color="var(--primary, #06B6D4)" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="var(--primary, #06B6D4)" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Ambient core glow -->
  <circle cx="256" cy="240" r="180" fill="url(#coreGlow)"/>

  <!-- Outer hexagonal shield frame -->
  <polygon
    points="256,52 432,152 432,352 256,452 80,352 80,152"
    fill="none"
    stroke="url(#brandGradient)"
    stroke-width="6"
    stroke-linejoin="round"
    opacity="0.3"
  />

  <!-- Inner hexagonal shield -->
  <polygon
    points="256,92 400,175 400,338 256,420 112,338 112,175"
    fill="none"
    stroke="url(#brandGradient)"
    stroke-width="3"
    stroke-linejoin="round"
    opacity="0.15"
  />

  <!-- Central proxy node — the "oxygen molecule" -->
  <g filter="url(#innerGlow)">
    <!-- Central hub circle -->
    <circle cx="256" cy="245" r="48" fill="url(#brandGradient)" opacity="0.9"/>
    <circle cx="256" cy="245" r="48" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>

    <!-- Three orbital proxy nodes -->
    <!-- Top-right node (US) -->
    <circle cx="356" cy="165" r="22" fill="url(#brandGradient)" opacity="0.7"/>
    <circle cx="356" cy="165" r="22" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

    <!-- Bottom-right node (EU) -->
    <circle cx="356" cy="330" r="22" fill="url(#brandGradient)" opacity="0.7"/>
    <circle cx="356" cy="330" r="22" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

    <!-- Left node (Asia) -->
    <circle cx="156" cy="245" r="22" fill="url(#brandGradient)" opacity="0.7"/>
    <circle cx="156" cy="245" r="22" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

    <!-- Connection lines (data flow paths) -->
    <line x1="296" y1="225" x2="338" y2="175" stroke="url(#brandGradient)" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
    <line x1="296" y1="265" x2="338" y2="320" stroke="url(#brandGradient)" stroke-width="2" opacity="0.5" stroke-linecap="round"/>
    <line x1="210" y1="245" x2="175" y2="245" stroke="url(#brandGradient)" stroke-width="2" opacity="0.5" stroke-linecap="round"/>

    <!-- Data flow dots on connection lines -->
    <circle cx="318" cy="198" r="4" fill="var(--accent, #22C55E)" opacity="0.8"/>
    <circle cx="320" cy="290" r="4" fill="var(--accent, #22C55E)" opacity="0.8"/>
    <circle cx="190" cy="245" r="4" fill="var(--accent, #22C55E)" opacity="0.8"/>
  </g>

  <!-- Inner hub icon — a stylized "proxy arrow" showing data routing -->
  <g transform="translate(256, 245)">
    <!-- Inbound arrow (left) -->
    <path d="M-18,0 L-6,-8 L-6,8 Z" fill="rgba(255,255,255,0.9)"/>
    <!-- Outbound arrow (right) -->
    <path d="M18,0 L6,-8 L6,8 Z" fill="rgba(255,255,255,0.9)"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="3" fill="rgba(255,255,255,0.95)"/>
  </g>

  <!-- Small orbit ring around hub -->
  <circle cx="256" cy="245" r="70" fill="none" stroke="url(#brandGradient)" stroke-width="1" opacity="0.2" stroke-dasharray="4 8"/>
</svg>
