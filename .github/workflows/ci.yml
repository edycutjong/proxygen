# ─────────────────────────────────────────────────────────────
# Proxygen — Production-Grade CI/CD Pipeline
# ─────────────────────────────────────────────────────────────
# 6-stage pipeline: Quality → Security → Build → E2E → Perf → Deploy
#
# Architecture:
#   Stage 1 (Quality) ──┐
#                        ├── parallel ──→ Stage 3 (Build)
#   Stage 2 (Security) ─┘                    │
#                                       Stage 4 (E2E)
#                                            │
#                                       Stage 5 (Performance)
#                                            │
#                                       Stage 6 (Deploy Gate)
# ─────────────────────────────────────────────────────────────

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────
# STAGE 1 — Code Quality Gate
# ─────────────────────────────────────────────────────────────
jobs:
  # ── Agent Quality ─────────────────────────────────────────
  agent-quality:
    name: "Stage 1 · Agent Quality"
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ${{ github.event_name == 'push' && fromJSON('[20, 22, 24]') || fromJSON('[20]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: agent/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: agent

      - name: Type check
        run: npm run typecheck
        working-directory: agent

      - name: Build
        run: npm run build
        working-directory: agent

      - name: Tests
        run: npm test
        working-directory: agent
        env:
          PROXYGEN_DEMO: 'true'

  # ── Dashboard Quality ─────────────────────────────────────
  dashboard-quality:
    name: "Stage 1 · Dashboard Quality"
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ${{ github.event_name == 'push' && fromJSON('[20, 22, 24]') || fromJSON('[20]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: dashboard

      - name: Lint
        run: npm run lint
        working-directory: dashboard

      - name: Type check
        run: npm run typecheck
        working-directory: dashboard

      - name: Unit tests with coverage
        run: npm run test:coverage
        working-directory: dashboard

      - name: Upload coverage report
        if: matrix.node-version == 20
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-coverage
          path: dashboard/coverage/
          retention-days: 7

  # ─────────────────────────────────────────────────────────
  # STAGE 2 — Security Gate
  # ─────────────────────────────────────────────────────────
  secret-scan:
    name: "Stage 2 · Secret Scanning"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --only-verified

  dependency-audit:
    name: "Stage 2 · Dependency Audit"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Agent audit
        run: |
          cd agent && npm ci
          npm audit --audit-level=high || true
        continue-on-error: true

      - name: Dashboard audit
        run: |
          cd dashboard && npm ci
          npm audit --audit-level=high || true
          npx license-checker --production --failOn "GPL-3.0;AGPL-3.0" --summary || true
        continue-on-error: true

  # ─────────────────────────────────────────────────────────
  # STAGE 3 — Build Verification
  # ─────────────────────────────────────────────────────────
  build:
    name: "Stage 3 · Build Verification"
    needs: [agent-quality, dashboard-quality]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build agent
        run: cd agent && npm ci && npm run build

      - name: Build dashboard
        run: cd dashboard && npm ci && npm run build

      - name: Check bundle size
        run: |
          echo "📦 Bundle Size Report"
          if [ -d "dashboard/.next" ]; then
            TOTAL_SIZE=$(du -sk dashboard/.next/static | cut -f1)
            echo "Total static assets: ${TOTAL_SIZE}KB"
            if [ "$TOTAL_SIZE" -gt 300 ]; then
              echo "::error::Bundle size ${TOTAL_SIZE}KB exceeds 300KB"
              exit 1
            elif [ "$TOTAL_SIZE" -gt 200 ]; then
              echo "::warning::Bundle size ${TOTAL_SIZE}KB exceeds 200KB"
            else
              echo "✅ Bundle size within budget"
            fi
          fi

  # ─────────────────────────────────────────────────────────
  # STAGE 4 — E2E Testing
  # ─────────────────────────────────────────────────────────
  e2e:
    name: "Stage 4 · E2E Tests"
    needs: [build]
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build application
        run: npm run build

      - name: Run E2E tests
        run: npx playwright test
        env:
          NODE_ENV: production

      - name: Upload E2E artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            dashboard/playwright-report/
            dashboard/test-results/
          retention-days: 7

  # ── Agent E2E ─────────────────────────────────────────────
  agent-e2e:
    name: "Stage 4 · Agent E2E"
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: agent/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: agent

      - name: Start Agent in Demo Mode & Validate Health
        run: |
          npm run build
          PROXYGEN_DEMO=true npm start &
          echo "Waiting for Agent API to be ready..."
          for i in {1..30}; do
            if curl -s http://localhost:3001/health | grep -q '"status":"ok"'; then
              echo "✅ Agent API is healthy!"
              exit 0
            fi
            sleep 1
          done
          echo "❌ Agent API failed to start or respond to healthcheck"
          exit 1
        working-directory: agent

      - name: Run Submission Checker
        run: python3 scripts/check_submission.py

  # ─────────────────────────────────────────────────────────
  # STAGE 5 — Performance
  # ─────────────────────────────────────────────────────────
  performance:
    name: "Stage 5 · Dashboard Performance"
    needs: [build]
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: dashboard

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Lighthouse CI
        run: |
          npm install -g @lhci/cli
          lhci autorun
        continue-on-error: true

  # ── Agent Performance ────────────────────────────────────
  agent-performance:
    name: "Stage 5 · Agent Performance"
    needs: [build]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Agent Scrape Benchmark
        run: python3 scripts/bench.py

  # ─────────────────────────────────────────────────────────
  # STAGE 6 — Deploy Gate
  # ─────────────────────────────────────────────────────────
  deploy-gate:
    name: "Stage 6 · Deploy Gate"
    needs: [build, e2e, agent-e2e, performance, agent-performance, secret-scan, dependency-audit]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: All gates passed
        run: |
          echo "🚀 All CI/CD gates passed!"
          echo ""
          echo "Pipeline Summary:"
          echo "  ✅ Stage 1 — Agent Quality (typecheck, build, tests)"
          echo "  ✅ Stage 1 — Dashboard Quality (lint, typecheck, tests)"
          echo "  ✅ Stage 2 — Secret Scanning (TruffleHog)"
          echo "  ✅ Stage 2 — Dependency Audit (npm)"
          echo "  ✅ Stage 3 — Build Verification (dual workspace)"
          echo "  ✅ Stage 4 — Dashboard E2E Tests (Playwright)"
          echo "  ✅ Stage 4 — Agent E2E Tests (health probe, submission verify)"
          echo "  ✅ Stage 5 — Dashboard Performance (Lighthouse CI)"
          echo "  ✅ Stage 5 — Agent Performance (scrape latency benchmark)"
          echo ""
          echo "Ready for deployment."
